<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Forest Rangers</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #eef7f2;
            --white: #ffffff;
            --dark-green: #1b4332;
            --leaf-green: #74c69d;
            --input-bg: #fcfdfc;
            --border-color: #d8e3dc;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .brand-title {
            color: var(--dark-green);
            font-weight: 600;
            font-size: 28px;
            margin-bottom: 30px;
            align-self: flex-start;
            margin-left: 10%;
        }

        .main-wrapper {
            display: flex;
            gap: 25px;
            width: 85%;
            max-width: 1000px;
        }

        /* Form Card */
        .card {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            flex: 1.4;
        }

        .card h2 {
            margin-top: 0;
            font-size: 24px;
            margin-bottom: 25px;
            color: #222;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 15px;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            background: var(--input-bg);
            font-family: inherit;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: var(--leaf-green);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--dark-green);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s, transform 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            background-color: #081c15;
            transform: translateY(-2px);
        }

        /* Info Card */
        .info-card {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            flex: 1;
        }

        .info-card h2 {
            margin-top: 0;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            gap: 15px;
        }

        .icon {
            font-size: 22px;
            width: 30px;
        }

        .contact-text {
            font-size: 15px;
            color: #444;
            margin: 0;
            line-height: 1.5;
        }

        .socials {
            margin-top: 35px;
            border-top: 1px solid #f0f0f0;
            padding-top: 25px;
        }

        .social-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            font-size: 15px;
            color: #333;
        }

        .circle {
            width: 28px;
            height: 28px;
            border: 1.5px solid #333;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 13px;
            font-weight: bold;
        }

        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: #888;
        }

        @media (max-width: 850px) {
            .main-wrapper { flex-direction: column; width: 90%; }
            .brand-title { margin-left: 5%; }
        }
    </style>
</head>
<body>

    <h1 class="brand-title">Forest Rangers</h1>

    <div class="main-wrapper">
        <div class="card">
            <h2>Send a Message</h2>
            <form action="javascript:void(0);">
                <div class="input-group">
                    <input type="text" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <textarea placeholder="Message example..." rows="5" required></textarea>
                </div>
                <button type="submit" class="submit-btn">SUBMIT 🍃</button>
            </form>
        </div>

        <div class="info-card">
            <h2>Direct Contact</h2>

            <div class="contact-item">
                <span class="icon">🍃</span>
                <p class="contact-text">123 street<br>Tbilisi,georgia 94612</p>
            </div>

            <div class="contact-item">
                <span class="icon">📞</span>
                <p class="contact-text">+1 (510) 555-0199</p>
            </div>

            <div class="contact-item">
                <span class="icon">✉️</span>
                <p class="contact-text">technovation.forestrangers@gmail.com</p>
            </div>

            <div class="socials">
                <div class="social-row"><span class="circle">f</span> Forest Rangers</div>
                <div class="social-row"><span class="circle">ig</span> Forest Rangers</div>
                <div class="social-row"><span class="circle">in</span> Forest Rangers</div>
            </div>
        </div>
    </div>

    <p class="footer">Forest Rangers © 2026. Protecting our environment.</p>

</body>
</html>
